<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="corteqs_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>corteqs_app</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Passkeys Web SDK stub.

    supabase_flutter -> passkeys -> passkeys_web bağımlılığı, web'de başlangıçta
    PasskeysWeb.registerWith() içinde KOŞULSUZ olarak PasskeyAuthenticator.init()
    çağırır. Global yoksa "Cannot read properties of undefined (reading 'init')"
    fırlatıp tüm engine bootstrap'ını çökertir (beyaz ekran).

    Uygulama passkey AKIŞINI hiç kullanmıyor (yalnız e-posta/şifre + Google OAuth).
    Bu yüzden harici bir SDK (corbado bundle.js) yüklemek yerine, init()'i
    karşılayan ve olası çağrıları güvenli şekilde no-op yapan minimal bir stub
    tanımlıyoruz. Gerçek passkey desteği gerekirse bu stub'ı kaldırıp resmi
    bundle.js'i (github.com/corbado/flutter-passkeys releases) ekleyin.
  -->
  <script>
    window.PasskeyAuthenticator = {
      init: function () {},
      register: function () { return Promise.reject('passkeys not supported on this build'); },
      login: function () { return Promise.reject('passkeys not supported on this build'); },
      cancelCurrentAuthenticatorOperation: function () {},
      isUserVerifyingPlatformAuthenticatorAvailable: function () { return Promise.resolve(false); },
      isConditionalMediationAvailable: function () { return Promise.resolve(false); },
      hasPasskeySupport: function () { return false; }
    };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
